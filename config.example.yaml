# CVE 补丁回溯分析工具 — 配置文件
# 复制为 config.yaml 后按需修改

# ─── Git 仓库 ────────────────────────────────────────────────
repositories:
  "5.10-hulk":
    path: "/path/to/linux"
    branch: "linux-5.10.y"
  # 可配置多个目标仓库:
  # "5.15-custom":
  #   path: "/path/to/another/linux"
  #   branch: "linux-5.15.y"

# ─── 缓存 ────────────────────────────────────────────────────
cache:
  enabled: true
  database_path: "./commit_cache.db"
  max_cached_commits: 10000000    # 最大缓存commit数 (千万级仓库设为 10000000)

# ─── 输出 ────────────────────────────────────────────────────
output:
  output_dir: "./analysis_results"
  log_level: "INFO"               # DEBUG / INFO / WARNING / ERROR
  log_file: "./cve_analysis.log"

# ─── LLM 分析 (可选) ──────────────────────────────────────────
# 为 validate 命令的验证报告提供 AI 驱动的差异分析能力
# 兼容 OpenAI 接口 (支持 DeepSeek / Azure / vLLM 等)
llm:
  enabled: false
  provider: "openai"
  api_key: ""                        # 也可通过 LLM_API_KEY 环境变量设置
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"
  max_tokens: 2000
  temperature: 0.3
  timeout: 60

# ─── 路径映射 ────────────────────────────────────────────────
# 内核版本演进中目录结构会发生变化，导致社区补丁的文件路径
# 在低版本仓库中不存在。配置映射规则后工具会自动双向翻译：
#   社区: fs/smb/client/foo.c  →  本地搜索: fs/cifs/foo.c
#   本地: fs/cifs/foo.c        →  比较时等价: fs/smb/client/foo.c
#
# upstream: 社区高版本路径前缀
# local:    本地低版本路径前缀
# since:    发生迁移的内核版本 (仅供参考)
path_mappings:
  # ── 6.2: CIFS/SMB 子系统重组 ──
  - upstream: "fs/smb/client/"
    local: "fs/cifs/"
    since: "6.2"
  - upstream: "fs/smb/server/"
    local: "fs/ksmbd/"
    since: "6.2"
  - upstream: "fs/smb/common/"
    local: "fs/smbfs_common/"
    since: "6.2"

  # ── 6.2: DRM AMD display link 重构 ──
  - upstream: "drivers/gpu/drm/amd/display/dc/link/"
    local: "drivers/gpu/drm/amd/display/dc/core/"
    since: "6.2"

  # ── 5.18: i915 display 拆分 ──
  - upstream: "drivers/gpu/drm/i915/display/"
    local: "drivers/gpu/drm/i915/"
    since: "5.18"

  # ── 5.16: rtw89 从 staging 毕业 ──
  - upstream: "drivers/net/wireless/realtek/rtw89/"
    local: "drivers/staging/rtw89/"
    since: "5.16"

  # ── 6.5: ath12k 从 staging 毕业 ──
  - upstream: "drivers/net/wireless/ath/ath12k/"
    local: "drivers/staging/ath12k/"
    since: "6.5"

  # ── 6.1: fscache → netfs 重组 ──
  - upstream: "fs/netfs/"
    local: "fs/fscache/"
    since: "6.1"

  # ── 自定义映射 (按需添加) ──
  # - upstream: "path/in/newer/kernel/"
  #   local: "path/in/your/kernel/"
  #   since: "x.y"

# ─── L0-L5 策略与可插拔规则 ─────────────────────────────────
# profile: conservative | balanced | aggressive | default
#   先套用预设阈值，YAML 中显式写的项再覆盖预设。
policy:
  enabled: true
  profile: "balanced"
  large_change_rules_enabled: true
  large_change_line_threshold: 80
  large_hunk_threshold: 8
  call_chain_rules_enabled: true
  call_chain_fanout_threshold: 6
  critical_structure_rules_enabled: true
  l1_api_surface_rules_enabled: true
  l1_return_line_delta_threshold: 2
  critical_structure_keywords:
    - "spin_lock"
    - "mutex"
    - "rcu"
    - "refcount"
    - "kref"
    - "atomic"
    - "struct"
  extra_rule_modules:
    # 自定义插件示例：放在 rules/ 目录下的 Python 模块
    # - "rules.my_kernel_rules"
